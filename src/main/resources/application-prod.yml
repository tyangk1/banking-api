# ======================== Production Profile ========================
spring:
  config:
    activate:
      on-profile: prod

  # ======================== Database ========================
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000

  # ======================== JPA ========================
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  # ======================== Flyway ========================
  flyway:
    enabled: true

  # ======================== Redis ========================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ======================== RabbitMQ ========================
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

# ======================== Logging ========================
logging:
  level:
    com.banking.api: INFO
    org.springframework: WARN
    org.hibernate: WARN
