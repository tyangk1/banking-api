# ======================== Banking API Configuration ========================
spring:
  application:
    name: banking-api

  # ======================== JPA / Hibernate ========================
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  # ======================== Flyway ========================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ======================== Jackson ========================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

  # ======================== Redis (Cache) ========================
  data:
    redis:
      timeout: 6000ms

  # ======================== RabbitMQ ========================
  rabbitmq:
    connection-timeout: 10000ms

  # ======================== Mail ========================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ======================== Server ========================
server:
  port: 8080
  servlet:
    context-path: /api

# ======================== API Documentation ========================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ======================== Actuator ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ======================== Application Custom ========================
app:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyPleaseChangeInProduction2024Banking}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
