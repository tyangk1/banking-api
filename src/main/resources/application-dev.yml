# ======================== Development Profile ========================
spring:
  config:
    activate:
      on-profile: dev

  # ======================== Database ========================
  datasource:
    url: jdbc:postgresql://localhost:5433/banking_db
    username: banking_user
    password: banking_secret
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # ======================== JPA ========================
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  # ======================== Flyway ========================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ======================== Redis ========================
  data:
    redis:
      host: localhost
      port: 6379

  # ======================== RabbitMQ ========================
  rabbitmq:
    host: localhost
    port: 5672
    username: banking_user
    password: banking_secret

# ======================== Logging ========================
logging:
  level:
    com.banking.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
